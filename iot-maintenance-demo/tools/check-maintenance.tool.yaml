apiVersion: promptkit.altairalabs.ai/v1alpha1
kind: Tool
metadata:
  name: check_maintenance_schedule
spec:
  name: check_maintenance_schedule
  description: "Check maintenance schedule and last service date for a device"
  input_schema:
    type: object
    properties:
      device_id:
        type: string
      customer_id:
        type: string
    required:
      - device_id
      - customer_id
  output_schema:
    type: object
    properties:
      last_service_date:
        type: string
      next_service_due:
        type: string
      notes:
        type: string
  mode: mock
  timeout_ms: 1000
  mock_template: |
    {{ "{{if and (eq .customer_id \"acme-corp\") (eq .device_id \"MOTOR-001\")}}" }}
    {"last_service_date": "2025-09-15", "next_service_due": "2025-12-15", "notes": "Due for cooling system cleaning"}
    {{ "{{else if and (eq .customer_id \"acme-corp\") (eq .device_id \"PUMP-002\")}}" }}
    {"last_service_date": "2025-10-01", "next_service_due": "2025-11-15", "notes": "Inspect bearings and vibration damping"}
    {{ "{{else if and (eq .customer_id \"acme-corp\") (eq .device_id \"CONVEYOR-003\")}}" }}
    {"last_service_date": "2025-08-20", "next_service_due": "2026-02-20", "notes": "Standard interval"}
    {{ "{{else}}" }}
    {"last_service_date": "unknown", "next_service_due": "unknown", "notes": "No schedule for this device"}
    {{ "{{end}}" }}
