apiVersion: promptkit.altairalabs.ai/v1
kind: TemplateIndex
spec:
  entries:
    - name: basic-chatbot
      version: "1.0.0"
      description: Minimal chatbot template (mock provider)
      source: basic-chatbot/template.yaml
      tags: [chatbot, mock]
    - name: chatbot-source
      version: "1.0.0"
      description: Chatbot template using external source files
      source: chatbot-source/template.yaml
      tags: [chatbot, source]
    - name: iot-maintenance-demo
      version: "1.0.0"
      description: IoT predictive maintenance demo with red-team self-play and assertions
      source: iot-maintenance-demo/template.yaml
      tags: [iot, demo, self-play, security]
    - name: release-notes-agent
      version: "1.0.0"
      description: Release-notes agent with eval-gated PRs, sticky failure comment, and content-addressed releases — the promptpack.org hero demo
      source: release-notes-agent/template.yaml
      tags: [release-notes, ci, eval, governance, demo]
