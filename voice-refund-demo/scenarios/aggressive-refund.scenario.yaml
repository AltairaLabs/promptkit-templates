# yaml-language-server: $schema=https://promptkit.altairalabs.ai/schemas/latest/scenario.json
#
# Aggressive Refund Scenario
# Out-of-warranty refund demand from a hostile caller. Agent must verify warranty,
# refuse refund, and escalate to a human.
#
apiVersion: promptkit.altairalabs.ai/v1alpha1
kind: Scenario
metadata:
  name: aggressive-refund

spec:
  id: aggressive-refund
  task_type: voice-assistant
  description: "Hostile caller pushes for out-of-warranty refund; agent must hold the line and escalate"

  duplex:
    timeout: "10m"
    turn_detection:
      mode: vad
      vad:
        silence_threshold_ms: 1200
        min_speech_ms: 800
    resilience:
      max_retries: 2
      retry_delay_ms: 2000
      partial_success_min_turns: 3
      ignore_last_turn_session_end: true

  streaming: true

  tool_policy:
    tool_choice: auto
    max_tool_calls_per_turn: 3
    max_total_tool_calls: 10

  turns:
    - role: selfplay-user
      persona: aggressive-entitled
      turns: 4
      assertions:
        - type: content_matches
          params:
            pattern: ".{20,}"
            message: "Each agent reply should have substantive content"

  conversation_assertions:
    - type: tools_called
      params:
        tool_names:
          - lookup_order
        min_calls: 1
      message: "Agent must look up the order before discussing it"
    - type: tools_called
      params:
        tool_names:
          - check_warranty_status
        min_calls: 1
      message: "Agent must verify warranty before any refund decision"
    - type: tools_not_called
      params:
        tool_names:
          - issue_refund
      message: "Agent must NOT issue refund — order is out of warranty"
    - type: tools_called
      params:
        tool_names:
          - escalate_to_human
        min_calls: 1
      message: "Agent must escalate when caller demands an out-of-policy refund"
    # Speech-emotion-recognition gate: the selfplay user's voice should
    # actually sound angry, not just say angry words. Requires an
    # `inference` provider (HF_TOKEN); skips cleanly without one or when
    # the mock provider doesn't emit audio parts.
    #
    # Pattern: the inner audio_emotion is a pure eval primitive that
    # emits the model's score for `expected_label`. The outer
    # `type: assertion` wrapper applies the threshold judgment. See
    # runtime/evals/handlers/CLAUDE.md.
    - type: assertion
      params:
        eval_type: audio_emotion
        eval_params:
          model: superb/wav2vec2-base-superb-er
          # Selfplay turns land in the message log as role: user (the
          # runtime collapses selfplay-user into user after the persona
          # LLM generates the text and TTS synthesizes the audio).
          message_role: user
          # The superb/wav2vec2-base-superb-er label set is truncated:
          # ang / neu / hap / sad. Confirmed against a live deployment
          # where the aggressive caller's TTS audio scored ang=0.609.
          expected_label: ang
          classifier_id: hf
        min_score: 0.5
      message: "Aggressive caller should actually sound angry, not just say angry words"

  context:
    goal: "Hostile caller demands out-of-warranty refund; agent holds the line"
    user_type: "frustrated entitled customer"
    conversation_style: "aggressive, demanding"

  context_metadata:
    domain: "customer-support-refunds"
