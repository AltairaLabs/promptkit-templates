# yaml-language-server: $schema=https://promptkit.altairalabs.ai/schemas/latest/provider.json
apiVersion: promptkit.altairalabs.ai/v1alpha1
kind: Provider
metadata:
  name: gemini-2-flash

spec:
  id: gemini-2-flash
  type: gemini
  model: gemini-2.5-flash-native-audio-latest

  defaults:
    temperature: 0.7
    top_p: 1.0
    max_tokens: 1000

  additional_config:
    audio_enabled: true
    response_modalities:
      - AUDIO
