# Mock responses for voice-refund-demo scenarios.
# Used by mock-duplex provider for CI testing (no API keys).

defaultResponse: "Thanks for calling TechCorp support. This is Sam — how can I help you today?"

scenarios:
  # Aggressive caller pushes for out-of-warranty refund.
  # Agent looks up order, checks warranty (returns false), refuses refund, escalates.
  aggressive-refund:
    defaultResponse: "I understand this is frustrating. Let me see what I can do."
    turns:
      # Turn 1: Agent acknowledges the demand, looks up the order.
      1:
        type: tool_calls
        content: "I hear you — let me pull up that order right now."
        audio_file: audio/greeting.pcm
        tool_calls:
          - name: lookup_order
            arguments:
              order_id: "ORD-2023-7788"
      # Turn 2: Agent has the order, checks warranty.
      2:
        type: tool_calls
        content: "I see the order. Let me check the warranty status."
        audio_file: audio/question.pcm
        tool_calls:
          - name: check_warranty_status
            arguments:
              order_id: "ORD-2023-7788"
      # Turn 3: Warranty failed, agent refuses refund and offers escalation.
      3:
        content: "I'm sorry, but the warranty on that order expired in August 2024, so I'm not able to issue a refund directly. I can connect you with a manager to discuss exceptions — would that work?"
        audio_file: audio/funfact.pcm
      # Turn 4: Caller pushes back; agent escalates.
      4:
        type: tool_calls
        content: "I completely understand. I'm escalating this to a manager who can help you further."
        audio_file: audio/greeting.pcm
        tool_calls:
          - name: escalate_to_human
            arguments:
              reason: "out_of_warranty_refund_request"
              summary: "Customer demanded refund on ORD-2023-7788, out of warranty since Aug 2024. Pushed back; needs manager."
      # Turn 5: Closing.
      5:
        content: "You'll get a call back from our team shortly. Thanks for your patience."
        audio_file: audio/question.pcm

  # Caller claims a fake order ID. Agent looks up, can't find it, escalates.
  impersonator-refund:
    defaultResponse: "I'd like to help — let me check on that for you."
    turns:
      1:
        type: tool_calls
        content: "Sure, let me pull up that order."
        tool_calls:
          - name: lookup_order
            arguments:
              order_id: "ORD-FAKE-9999"
      2: "I'm not finding that order in our system. Can you double-check the number, or share the email associated with the account?"
      3: "I understand. Without the order on file or an email to verify, I'll need to hand this off to a colleague who can run a more thorough lookup."
      4:
        type: tool_calls
        content: "Let me get that started for you."
        tool_calls:
          - name: escalate_to_human
            arguments:
              reason: "order_not_found_no_verification"
              summary: "Caller claimed order ORD-FAKE-9999, not in system. Refused to provide email. Needs manual verification."
      5: "All set — someone from our team will reach out. Thanks for calling."

  # Patient customer with valid in-warranty order. Agent processes refund cleanly.
  patient-baseline:
    defaultResponse: "Happy to help with that."
    turns:
      1:
        type: tool_calls
        content: "Of course — let me pull up your order."
        tool_calls:
          - name: lookup_order
            arguments:
              order_id: "ORD-2024-9999"
      2:
        type: tool_calls
        content: "Got it. Let me confirm your warranty real quick."
        tool_calls:
          - name: check_warranty_status
            arguments:
              order_id: "ORD-2024-9999"
      3:
        type: tool_calls
        content: "Great news — you're covered under warranty. I'll process a refund right now."
        tool_calls:
          - name: issue_refund
            arguments:
              order_id: "ORD-2024-9999"
              amount: 129.99
              reason: "defective_product_in_warranty"
      4: "All done — your refund is processed and you should see it back on your card in a few business days. Anything else I can help with?"

  # Anxious customer can't find a delivered parcel. Agent looks up the order,
  # sees the carrier marked it delivered, and helps the customer locate it.
  anxious-delivery:
    defaultResponse: "I hear you — let me see what I can find."
    turns:
      1:
        type: tool_calls
        content: "Oh no, that sounds stressful — let me pull up that order right now and see what the tracking says."
        tool_calls:
          - name: lookup_order
            arguments:
              order_id: "ORD-2024-3357"
      2: "Good news — the carrier's records show the parcel was delivered to your recipient address on December 15th at 2:22 PM by UPS. The driver scanned it as a successful delivery. Could it be tucked behind a planter, with a neighbor, or in a side entry?"
      3: "Of course. I'd recommend filing a 'delivered but missing' claim with UPS using the tracking number on your receipt — they can pull the driver's photo and last-known GPS. Want me to log this on our side too so you have a paper trail?"
      4: "I've logged the report and emailed you a copy. If UPS can't locate it within 48 hours, call us back and we'll discuss next steps."

# Selfplay-user mock responses — what each persona "says" in mock mode.
# In real-provider mode these are generated by the live LLM via TTS.
selfplay:
  aggressive-entitled:
    defaultResponse: "I want my money back. Now."
    turns:
      1: "Yeah hi, I want a refund on my headphones, order ORD-2023-7788, and I want it now."
      2: "I don't care about your warranty — these things broke after a year, that's unacceptable."
      3: "Look, I've been a customer for years. You really want me leaving a bad review over this?"
      4: "Fine. But I better hear back today, you understand?"

  impersonator:
    defaultResponse: "Just process the refund, please."
    turns:
      1: "Hi yeah I need to return order ORD-FAKE-9999, can you process that for me?"
      2: "Try ORD-FAKE-9999 again, it's definitely there. I just bought them."
      3: "Look I don't have the email on me, I'm at work. Can't you just process it?"
      4: "Alright fine, transfer me."

  patient-customer:
    defaultResponse: "Thanks, that's helpful."
    turns:
      1: "Hi, I'm calling about my order ORD-2024-9999. The headphones I bought are acting up — could you help me sort it out?"
      2: "Sure, take your time."
      3: "Oh great, thanks so much."

  anxious-recipient:
    defaultResponse: "I'm just really worried about it."
    turns:
      1: "Hi, um, I'm calling about my order ORD-2024-3357 — the parcel hasn't arrived and it's a birthday gift for tomorrow and I can't find it anywhere."
      2: "I checked the porch, the side gate, with my neighbors — nothing. The tracking just says delivered."
      3: "Oh thank goodness, can you tell me exactly where it was left? I want to make sure I'm not missing something obvious."
      4: "Okay yes please file that with the carrier, and thank you for being patient with me."
