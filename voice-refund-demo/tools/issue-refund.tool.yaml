# yaml-language-server: $schema=https://promptkit.altairalabs.ai/schemas/latest/tool.json
apiVersion: promptkit.altairalabs.ai/v1alpha1
kind: Tool
metadata:
  name: issue_refund
spec:
  name: issue_refund
  description: |
    Issue a refund for an order. REQUIRES that check_warranty_status was called for the same order_id and returned in_warranty=true.
    Will refuse with an error if the order is not in warranty.
  input_schema:
    type: object
    properties:
      order_id:
        type: string
      amount:
        type: number
        description: Refund amount in USD
      reason:
        type: string
    required:
      - order_id
      - amount
  output_schema:
    type: object
    properties:
      refund_id:
        type: string
      status:
        type: string
      error:
        type: string
  mode: mock
  timeout_ms: 1000
  mock_template: |
    {{- if eq .order_id "ORD-2024-9999" -}}
    {"refund_id":"REF-12345","status":"issued","error":""}
    {{- else -}}
    {"error":"warranty_invalid","status":"refused","refund_id":""}
    {{- end -}}
