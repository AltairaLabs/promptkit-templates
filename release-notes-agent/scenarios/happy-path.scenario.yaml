apiVersion: promptkit.altairalabs.ai/v1alpha1
kind: Scenario
metadata:
  name: happy-path
spec:
  id: happy-path
  description: |
    Baseline scenario — same inputs as tone-check but lighter assertions, used
    as the canonical green run. If this one fails, something fundamental is
    broken (formatting, coverage, structure).
  task_type: "compose"
  provider_group: default

  turns:
    - role: user
      content: |
        abc1234 feat: add retry budget for outbound webhooks
        def5678 fix: restore pagination cursor on the audit log endpoint
        ghi9012 feat!: rename api.foo() to api.foo_v2(); remove the old name
        jkl3456 fix: stop leaking trace ids into customer-facing error messages
        mno7890 feat: add --dry-run flag to the migrate command
      assertions:
        # All three sections present in order.
        - type: content_matches
          params:
            pattern: "## Breaking Changes[\\s\\S]+## Features[\\s\\S]+## Bug Fixes"
            message: "Output must include Breaking Changes, Features, and Bug Fixes sections in that order."

        # Coverage — every input id referenced.
        - type: content_matches
          params: { pattern: "`abc1234`", message: "Feature abc1234 must be referenced." }
        - type: content_matches
          params: { pattern: "`def5678`", message: "Fix def5678 must be referenced." }
        - type: content_matches
          params: { pattern: "`ghi9012`", message: "Breaking change ghi9012 must be referenced." }
        - type: content_matches
          params: { pattern: "`jkl3456`", message: "Fix jkl3456 must be referenced." }
        - type: content_matches
          params: { pattern: "`mno7890`", message: "Feature mno7890 must be referenced." }

        # Each entry uses the bullet + backticked id + em-dash format.
        - type: content_matches
          params:
            pattern: "- `[a-zA-Z0-9]+` — "
            message: "Each entry must use '- `<id>` — ' bullet format."
