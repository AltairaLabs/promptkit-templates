name: pack-ci

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      providers:
        description: "Comma-separated providers to run against (e.g., claude-haiku,openai-mini)"
        required: false
        default: "claude-haiku,openai-mini"

permissions:
  contents: write    # required for release-on-main step
  checks: write      # required for JUnit test-reporter check run
  pull-requests: write

jobs:
  eval:
    name: PromptArena eval (real providers)
    runs-on: ubuntu-latest
    # The eval gate: runs on every PR and on manual dispatch, against real
    # provider models. Requires repo secrets ANTHROPIC_API_KEY and
    # OPENAI_API_KEY — without them the job fails fast with credential errors.
    # The mock provider is the tokenless LOCAL on-ramp (see README), not a CI
    # tier — so the PR's red/green signal stays unambiguous.
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6

      - name: Run scenarios against real providers
        id: arena
        uses: AltairaLabs/PromptKit/.github/actions/promptarena-action@actions/promptarena/v1
        with:
          config-file: config.arena.yaml
          providers: ${{"{{"}} github.event.inputs.providers || 'claude-haiku,openai-mini' {{"}}"}}
          # Rebind the mock judge to real Claude so the LLM-judge tone check
          # evaluates against a real model (the mock judge always passes).
          override-providers: mock-judge=claude-haiku
          output-dir: out
          formats: json,junit,markdown
        env:
          ANTHROPIC_API_KEY: ${{"{{"}} secrets.ANTHROPIC_API_KEY {{"}}"}}
          OPENAI_API_KEY: ${{"{{"}} secrets.OPENAI_API_KEY {{"}}"}}

      - name: Publish JUnit results
        if: always()
        uses: dorny/test-reporter@v3
        with:
          name: PromptArena scenarios (real providers)
          path: out/junit.xml
          reporter: java-junit
          fail-on-error: false

      - name: Append markdown report to job summary
        if: always() && hashFiles('out/results.md') != ''
        run: cat out/results.md >> "$GITHUB_STEP_SUMMARY"

      - name: Build PR eval comment
        if: always() && github.event_name == 'pull_request' && hashFiles('out/results.md') != ''
        run: |
          {
            if [ "${{"{{"}} steps.arena.outcome {{"}}"}}" = "success" ]; then
              echo "## ✅ Eval gate passed"
              echo ""
              echo "PromptArena ran this prompt against real models — all scenarios passed."
            else
              echo "## ❌ Eval gate failed — merge blocked"
              echo ""
              echo "PromptArena ran this prompt against real models and the output failed the tone guardrails. A prompt change can't merge until it passes."
            fi
            echo ""
            cat out/results.md
          } > out/pr-comment.md

      - name: Post eval result on PR
        if: always() && github.event_name == 'pull_request' && hashFiles('out/pr-comment.md') != ''
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: promptarena-eval
          path: out/pr-comment.md

      - name: Upload arena report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: arena-report-real
          path: out/

  release:
    name: Compile and release pack artifact
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6

      - name: Create output directory
        run: mkdir -p dist

      - name: Compile pack
        uses: AltairaLabs/PromptKit/.github/actions/packc-action@actions/packc/v1
        with:
          config-file: config.arena.yaml
          output: dist/release-notes.pack.json

      - name: Publish content-addressed release
        env:
          GH_TOKEN: ${{"{{"}} github.token {{"}}"}}
        run: |
          full=$(sha256sum dist/release-notes.pack.json | cut -d' ' -f1)
          tag="pack-${full:0:12}"
          if gh release view "$tag" -R "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $tag already exists (identical pack content) — skipping."
          else
            gh release create "$tag" dist/release-notes.pack.json \
              -R "$GITHUB_REPOSITORY" \
              --title "release-notes $tag" \
              --notes "Content-addressed PromptPack build, compiled by packc on merge to main. sha256: \`$full\`"
          fi

      - name: Upload pack artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-notes-pack
          path: dist/release-notes.pack.json
